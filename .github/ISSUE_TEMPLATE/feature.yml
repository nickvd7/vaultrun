name: Feature request
description: Suggest an improvement to the open-core product.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas for the **Apache 2.0 core**. Enterprise SSO / commercial requests → [vaultrun.dev/#contact](https://vaultrun.dev/#contact).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain does this solve? Who hits it?
      placeholder: Agents need X when running behind our proxy…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should VaultRun do? Keep it concrete.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API / sessions / runs
        - MCP tools
        - Dashboard
        - SDKs
        - CI runner
        - Policy / security
        - Docs / DX
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other products you looked at (optional).
    validations:
      required: false
