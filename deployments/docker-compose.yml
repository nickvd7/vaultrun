version: "3.9"

# Required environment variables (set in .env before running):
#   MASTER_API_KEY  — bootstrap key for creating the first API key
#   POSTGRES_PASSWORD — database password
#
# See .env.example for all available options.

services:
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://vaultrun:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/vaultrun?sslmode=disable
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - WORKSPACE_BASE_DIR=/data/workspaces
      - MIGRATIONS_PATH=/app/migrations
      - MASTER_API_KEY=${MASTER_API_KEY:?MASTER_API_KEY must be set}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKER_CONTAINER_PREFIX=vaultrun
      - MAX_FILE_MB=${MAX_FILE_MB:-100}
      - MAX_OUTPUT_MB=${MAX_OUTPUT_MB:-10}
      - GIN_MODE=${GIN_MODE:-release}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      # Async workers
      - ASYNC_WORKERS=${ASYNC_WORKERS:-4}
      - ASYNC_QUEUE_SIZE=${ASYNC_QUEUE_SIZE:-256}
      # Rate limiting
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-120}
      - ACTOR_RATE_LIMIT_PER_MIN=${ACTOR_RATE_LIMIT_PER_MIN:-0}
      # Session resource limits
      - MAX_SESSION_CPU=${MAX_SESSION_CPU:-8}
      - MAX_SESSION_MEMORY_MB=${MAX_SESSION_MEMORY_MB:-8192}
      - MAX_SESSION_TIMEOUT_SEC=${MAX_SESSION_TIMEOUT_SEC:-86400}
      - MAX_SESSIONS_PER_ACTOR=${MAX_SESSIONS_PER_ACTOR:-20}
      - MAX_WORKSPACE_MB=${MAX_WORKSPACE_MB:-0}
      # Docker sandbox
      - DOCKER_DEFAULT_IMAGE=${DOCKER_DEFAULT_IMAGE:-python:3.12-slim}
      - DOCKER_IDLE_TIMEOUT_MINS=${DOCKER_IDLE_TIMEOUT_MINS:-30}
      # Redis auth
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      # Observability
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AUDIT_LOG_RETENTION_DAYS=${AUDIT_LOG_RETENTION_DAYS:-90}
      - STOP_CONTAINERS_ON_SHUTDOWN=${STOP_CONTAINERS_ON_SHUTDOWN:-false}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      # Auth / policy
      - OPA_POLICY_FILE=${OPA_POLICY_FILE:-}
      # TLS (set both to enable HTTPS on the API server)
      - TLS_CERT_FILE=${TLS_CERT_FILE:-}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-}
      - DOCKER_IMAGE_ALLOWLIST=${DOCKER_IMAGE_ALLOWLIST:-}
      # Seccomp + cosign (optional but recommended in production)
      - DOCKER_SECCOMP_PROFILE=${DOCKER_SECCOMP_PROFILE:-}
      - COSIGN_PUBLIC_KEY=${COSIGN_PUBLIC_KEY:-}
      # Database TLS (set to require or verify-full in production)
      - DB_SSL_MODE=${DB_SSL_MODE:-}
      - DB_SSL_ROOT_CERT=${DB_SSL_ROOT_CERT:-}
      - DB_SSL_CERT=${DB_SSL_CERT:-}
      - DB_SSL_KEY=${DB_SSL_KEY:-}
    # NET_ADMIN is required for host-side iptables egress filtering when
    # AllowedHosts is set on sessions. Remove if you don't use AllowedHosts.
    cap_add:
      - NET_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace_data:/data/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=vaultrun
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=vaultrun
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultrun"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  workspace_data:
