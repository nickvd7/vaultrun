name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run SDK tests
        run: |
          cd sdk/python
          pip install -e ".[dev]"
          pytest

      - name: Build distribution
        run: |
          cd sdk/python
          pip install build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: sdk/python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      # Trusted publisher on PyPI must match:
      #   Owner: nickvd7  Repository: vaultrun  Workflow: pypi.yml  (no environment)
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
