openapi: "3.1.0"
info:
  title: VaultRun API
  version: "1.0.0"
  description: |
    REST API for the VaultRun sandbox execution platform.
    All `/api/v1/*` endpoints require an API key passed in the `X-API-Key` header.
    Key-management endpoints additionally require the master key.
  contact:
    name: VaultRun
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: System health and observability
  - name: sessions
    description: Sandbox session lifecycle
  - name: runs
    description: Command execution inside sessions
  - name: files
    description: File upload / download within a session workspace
  - name: keys
    description: API key management (master key required)
  - name: audit
    description: Immutable audit log
  - name: policy
    description: OPA policy inspection (master key required)

# ──────────────────────────────────────────────────────────────────────────────
# Security schemes
# ──────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    # ── Common ─────────────────────────────────────────────────────────────────
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "session not found"

    Pagination:
      type: object
      required: [page, limit, offset, total]
      properties:
        page:   { type: integer, example: 1 }
        limit:  { type: integer, example: 50 }
        offset: { type: integer, example: 0 }
        total:  { type: integer, example: 142 }

    # ── Sessions ───────────────────────────────────────────────────────────────
    Session:
      type: object
      required: [id, image, status, network_enabled, cpu_limit, memory_limit_mb, timeout_seconds, created_at, labels]
      properties:
        id:               { type: string, format: uuid }
        name:             { type: string, nullable: true }
        image:            { type: string, example: "python:3.12-slim" }
        status:           { type: string, enum: [pending, running, stopped, error] }
        container_id:     { type: string, nullable: true }
        network_enabled:  { type: boolean }
        cpu_limit:        { type: number, format: double, example: 1.0 }
        memory_limit_mb:  { type: integer, example: 512 }
        timeout_seconds:  { type: integer, example: 300 }
        labels:
          type: object
          additionalProperties: { type: string }
          example: { project: "demo", env: "dev" }
        created_at:  { type: string, format: date-time }
        stopped_at:  { type: string, format: date-time, nullable: true }

    CreateSessionRequest:
      type: object
      properties:
        name:             { type: string }
        image:            { type: string, default: "python:3.12-slim" }
        network_enabled:  { type: boolean, default: false }
        cpu_limit:        { type: number, format: double, default: 1.0 }
        memory_limit_mb:  { type: integer, default: 512 }
        timeout_seconds:  { type: integer, default: 300 }
        labels:
          type: object
          additionalProperties: { type: string }

    UpdateLabelsRequest:
      type: object
      required: [labels]
      properties:
        labels:
          type: object
          additionalProperties: { type: string }
          description: "Full replacement of the label set. Pass {} to clear all labels."

    # ── Runs ───────────────────────────────────────────────────────────────────
    Run:
      type: object
      required: [id, session_id, command, args, status, timeout_seconds, created_at]
      properties:
        id:               { type: string, format: uuid }
        session_id:       { type: string, format: uuid }
        command:          { type: string, example: "python" }
        args:             { type: array, items: { type: string }, example: ["script.py"] }
        status:           { type: string, enum: [pending, running, completed, failed, timeout] }
        exit_code:        { type: integer, nullable: true }
        stdout:           { type: string, nullable: true }
        stderr:           { type: string, nullable: true }
        duration_ms:      { type: integer, nullable: true }
        output_truncated: { type: boolean }
        timeout_seconds:  { type: integer }
        created_at:       { type: string, format: date-time }
        started_at:       { type: string, format: date-time, nullable: true }
        finished_at:      { type: string, format: date-time, nullable: true }

    RunRequest:
      type: object
      required: [command]
      properties:
        command:          { type: string, example: "python" }
        args:             { type: array, items: { type: string }, example: ["script.py"] }
        env:
          type: object
          additionalProperties: { type: string }
        working_dir:      { type: string, example: "/workspace" }
        timeout_seconds:  { type: integer, default: 30 }

    AsyncRunRequest:
      allOf:
        - $ref: '#/components/schemas/RunRequest'
        - type: object
          properties:
            callback_url:
              type: string
              format: uri
              description: "Optional HTTP endpoint to POST the completed Run to."

    AsyncRunResult:
      type: object
      required: [run_id, status, message]
      properties:
        run_id:  { type: string, format: uuid }
        status:  { type: string, example: "pending" }
        message: { type: string, example: "run enqueued" }

    # ── Files ──────────────────────────────────────────────────────────────────
    File:
      type: object
      required: [id, session_id, path, size_bytes, content_type, created_at]
      properties:
        id:           { type: string, format: uuid }
        session_id:   { type: string, format: uuid }
        path:         { type: string, example: "/workspace/script.py" }
        size_bytes:   { type: integer }
        content_type: { type: string, example: "text/x-python" }
        created_at:   { type: string, format: date-time }

    # ── API Keys ───────────────────────────────────────────────────────────────
    APIKey:
      type: object
      required: [id, name, prefix, active, created_at]
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        prefix:       { type: string, example: "vr_abc12" }
        active:       { type: boolean }
        created_at:   { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        expires_at:   { type: string, format: date-time, nullable: true }

    CreatedKey:
      allOf:
        - $ref: '#/components/schemas/APIKey'
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: "Full plaintext key — only returned once at creation time."
              example: "vr_abc12xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

    CreateKeyRequest:
      type: object
      required: [name]
      properties:
        name:       { type: string }
        expires_at: { type: string, format: date-time, nullable: true }

    # ── Audit ──────────────────────────────────────────────────────────────────
    AuditEvent:
      type: object
      required: [id, actor, action, created_at]
      properties:
        id:         { type: string, format: uuid }
        actor:      { type: string }
        session_id: { type: string, format: uuid, nullable: true }
        run_id:     { type: string, format: uuid, nullable: true }
        action:     { type: string, example: "command.started" }
        metadata:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    # ── Health ─────────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status: { type: string, enum: [ok, error] }
                error:  { type: string }
            docker:
              type: object
              properties:
                status: { type: string, enum: [ok, error, not_configured] }
                error:  { type: string }
            job_queue:
              type: object
              properties:
                status:  { type: string }
                pending: { type: integer }

# ──────────────────────────────────────────────────────────────────────────────
# Global security (all routes require the API key unless overridden)
# ──────────────────────────────────────────────────────────────────────────────
security:
  - ApiKeyAuth: []

# ──────────────────────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────────────────────
paths:
  # ── Health / metrics ─────────────────────────────────────────────────────────
  /health:
    get:
      tags: [health]
      summary: System health check
      security: []     # unauthenticated
      responses:
        "200":
          description: All required checks pass
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        "503":
          description: Database unreachable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }

  /metrics:
    get:
      tags: [health]
      summary: Prometheus metrics
      security: []     # unauthenticated
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema: { type: string }

  # ── API Keys ──────────────────────────────────────────────────────────────────
  /api/v1/keys:
    post:
      tags: [keys]
      summary: Create a new API key
      description: Master key required.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateKeyRequest' }
      responses:
        "201":
          description: Key created — plaintext is only returned here
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatedKey' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

    get:
      tags: [keys]
      summary: List all API keys
      description: Master key required. Plaintext keys are never returned.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_keys:
                    type: array
                    items: { $ref: '#/components/schemas/APIKey' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /api/v1/keys/{id}:
    delete:
      tags: [keys]
      summary: Revoke an API key
      description: Master key required.
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      responses:
        "204": { description: Key revoked }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Sessions ─────────────────────────────────────────────────────────────────
  /api/v1/sessions:
    post:
      tags: [sessions]
      summary: Create a sandbox session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSessionRequest' }
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

    get:
      tags: [sessions]
      summary: List sessions
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - name: label
          in: query
          description: "Filter by label: key:value"
          schema: { type: string, example: "env:prod" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { $ref: '#/components/schemas/Session' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sessions/{id}:
    get:
      tags: [sessions]
      summary: Get a session
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [sessions]
      summary: Delete a session and its container
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      responses:
        "204": { description: Session deleted }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /api/v1/sessions/{id}/labels:
    patch:
      tags: [sessions]
      summary: Replace session labels
      description: Fully replaces the label set. Pass an empty object to clear all labels.
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateLabelsRequest' }
      responses:
        "200":
          description: Labels updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  labels:
                    type: object
                    additionalProperties: { type: string }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Runs ──────────────────────────────────────────────────────────────────────
  /api/v1/sessions/{id}/run:
    post:
      tags: [runs]
      summary: Execute a command (blocking)
      description: Waits for the command to finish and returns the full result.
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunRequest' }
      responses:
        "200":
          description: Command completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }

  /api/v1/sessions/{id}/run/stream:
    post:
      tags: [runs]
      summary: Execute a command with real-time SSE streaming
      description: |
        Streams stdout and stderr as they arrive using Server-Sent Events.
        Each event is a JSON object:
        - `{"type":"stdout","data":"..."}` — stdout chunk
        - `{"type":"stderr","data":"..."}` — stderr chunk
        - `{"type":"done","run_id":"...","status":"completed","exit_code":0,"duration_ms":123}` — final
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RunRequest' }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }

  /api/v1/sessions/{id}/run/async:
    post:
      tags: [runs]
      summary: Submit a command for async execution
      description: |
        Returns immediately with a `run_id`. The command executes in a background
        worker. Poll `GET /api/v1/runs/{run_id}` for status, or supply a
        `callback_url` to receive a webhook POST when done.

        The webhook POST body is `{"run_id":"...","status":"completed","run":{...}}`.
        When `WEBHOOK_SECRET` is configured the request includes an
        `X-VaultRun-Signature: sha256=<hex>` header for verification.
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AsyncRunRequest' }
      responses:
        "202":
          description: Run enqueued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AsyncRunResult' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }
        "503":
          description: Job queue full or not configured
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/sessions/{id}/runs:
    get:
      tags: [runs]
      summary: List runs for a session
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/Run' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /api/v1/runs/{id}:
    get:
      tags: [runs]
      summary: Get a run by ID
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Files ──────────────────────────────────────────────────────────────────
  /api/v1/sessions/{id}/files:
    post:
      tags: [files]
      summary: Upload a file to the session workspace
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, path]
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                  description: "Destination path in the workspace, e.g. script.py"
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/File' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

    get:
      tags: [files]
      summary: List files in the session workspace
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items: { $ref: '#/components/schemas/File' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /api/v1/sessions/{id}/workspace.zip:
    get:
      tags: [files]
      summary: Download the entire workspace as a ZIP archive
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
      responses:
        "200":
          description: ZIP archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /api/v1/sessions/{id}/files/{path}:
    get:
      tags: [files]
      summary: Download a single file from the workspace
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
        - name: path
          in: path
          required: true
          schema: { type: string }
          description: "File path relative to the workspace root, e.g. output/result.json"
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [files]
      summary: Delete a file from the workspace
      parameters:
        - { $ref: '#/components/parameters/ResourceID' }
        - name: path
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: File deleted }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Audit ──────────────────────────────────────────────────────────────────
  /api/v1/audit:
    get:
      tags: [audit]
      summary: List audit events
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - name: session_id
          in: query
          schema: { type: string, format: uuid }
        - name: actor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  # ── Policy ────────────────────────────────────────────────────────────────
  /api/v1/policy:
    get:
      tags: [policy]
      summary: Get active OPA policy source
      description: Master key required.
      responses:
        "200":
          description: Rego policy source
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy: { type: string }
                  mode:   { type: string, enum: [opa, allow_all] }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /api/v1/policy/eval:
    post:
      tags: [policy]
      summary: Dry-run evaluate the active policy
      description: Master key required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string, format: uuid }
                command:    { type: string }
                args:       { type: array, items: { type: string } }
                path:       { type: string }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed: { type: boolean }
                  reason:  { type: string }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

# ──────────────────────────────────────────────────────────────────────────────
# Shared parameters and responses
# ──────────────────────────────────────────────────────────────────────────────
  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, minimum: 1, maximum: 200 }

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Session is stopped or container is not running
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
